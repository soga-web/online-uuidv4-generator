<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UUID v4 Generator</title>
    <meta
      name="description"
      content="UUID v4 をブラウザ上で生成して、すぐにコピーできるシンプルなジェネレーターです。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <h1>UUID v4生成ツール</h1>
        <p class="lead">
          ブラウザだけで UUID v4 を生成し、そのままコピーできます。開いてすぐ使える、シンプルなジェネレーターです。
        </p>
      </header>

      <main class="panel">
        <section class="generator generator-full" aria-label="UUID generator">
          <span class="badge">RFC 4122 v4</span>

          <div class="uuid-output" aria-live="polite">
            <code id="uuid-output">UUID がここに表示されます</code>
          </div>

          <div class="secondary-actions">
            <button
              id="generate-button"
              class="utility-button utility-regenerate-button"
              type="button"
              aria-label="UUIDを再生成"
              title="UUIDを再生成"
            >
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                aria-hidden="true"
                focusable="false"
              >
                <path
                  d="M20 12a8 8 0 1 1-2.34-5.66"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.8"
                />
                <path
                  d="M20 4v5h-5"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.8"
                />
              </svg>
              <span>再生成</span>
            </button>
          </div>

          <div class="actions">
            <button id="copy-button" class="button button-primary button-copy" type="button">
              コピー
            </button>
          </div>

          <p id="status-message" class="status" aria-live="polite"></p>
        </section>
      </main>
    </div>
  </body>
</html>
